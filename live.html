<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Equal - Dating on Pi Network</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',system-ui,sans-serif;background:#F7F4EE;color:#232323;min-height:100dvh;display:flex;flex-direction:column;align-items:center}
.container{width:100%;max-width:430px;min-height:100dvh;padding-top:calc(48px + env(safe-area-inset-top));position:relative;background:radial-gradient(circle at 30% 30%,rgba(187,131,201,.35),transparent 60%),radial-gradient(circle at 70% 70%,rgba(125,224,179,.3),transparent 60%),#F7F4EE;display:flex;flex-direction:column;align-items:center}
.logo{display:flex;align-items:center;gap:12px;margin-top:20px}
.logo-icon{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#BB83C9,#7DE0B3);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:700}
.logo-text{font-size:22px;font-weight:700;color:#232323}
.hero{margin-top:40px;text-align:center}
.hero-img{width:280px;height:350px;object-fit:contain;animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.headline{text-align:center;margin-top:32px;font-size:36px;font-weight:700;line-height:1.05;letter-spacing:-1px;padding:0 20px}
.subtitle{text-align:center;margin-top:16px;font-size:16px;color:rgba(35,35,35,0.65);line-height:1.6;padding:0 32px;max-width:360px}
.btn{width:90%;max-width:380px;height:56px;border-radius:28px;border:none;background:#BB83C9;color:#fff;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:40px;box-shadow:0 4px 16px rgba(187,131,201,0.3);font-family:inherit}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.footer{margin-top:auto;padding:16px;text-align:center;font-size:13px;color:rgba(35,35,35,0.35)}
#console{position:fixed;bottom:0;left:0;right:0;max-height:200px;overflow-y:auto;background:rgba(0,0,0,0.85);color:#7DE0B3;font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px;z-index:9999}
#console .err{color:#ff6b6b}
</style>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div class="container">
  <div class="logo"><div class="logo-icon">E</div><div class="logo-text">Equal</div></div>
  <div class="hero"><img src="/hero-couple.png" class="hero-img" alt="Equal"></div>
  <h1 class="headline">Your affection has no price</h1>
  <p class="subtitle">The first dating app on Pi Network where connections are earned, not bought.</p>
  <button class="btn" id="loginBtn" onclick="doLogin()">
    <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#8B5CF6"/><text x="12" y="17" text-anchor="middle" fill="white" font-size="14" font-weight="600">&pi;</text></svg>
    <span id="btnText">Login with Pi</span>
  </button>
  <div class="footer">Free. Forever. No hidden fees.</div>
</div>
<div id="console"></div>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
var API_URL='https://equal-backend.onrender.com/v1';
function log(msg,err){var c=document.getElementById('console');var d=document.createElement('div');d.textContent='['+new Date().toLocaleTimeString()+'] '+msg;if(err){d.className='err';d.textContent+=' ERR:'+err.message}console.log(msg,err||'');c.appendChild(d)}

var _isPiBrowser=/PiBrowser/i.test(navigator.userAgent);
log('[PI] UA='+navigator.userAgent.substring(0,60));
log('[PI] isPiBrowser='+_isPiBrowser);

if(typeof Pi!=='undefined'){
  try{
    var cfg={version:"2.0"};
    if(!_isPiBrowser)cfg.sandbox=true;
    log('[PI] init cfg='+JSON.stringify(cfg));
    Pi.init(cfg);
    log('[PI] init OK');
  }catch(e){
    log('[PI] init ERR',e);
    try{Pi.init({version:"2.0",sandbox:true});}catch(e2){}
  }
}else{log('[PI] SDK NOT LOADED')}

function doLogin(){
  log('[AUTH] Starting login...');
  if(!window.Pi){log('[AUTH] Pi SDK not found');return}
  document.getElementById('btnText').textContent='Loading...';
  document.getElementById('loginBtn').disabled=true;
  
  window.Pi.authenticate(['username'],function(p){log('[AUTH] Incomplete payment:',p.paymentIdentifier)})
  .then(function(authResult){
    log('[AUTH] Pi OK, token len='+authResult.accessToken.length);
    log('[AUTH] Calling backend...');
    return fetch(API_URL+'/auth/pi',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({accessToken:authResult.accessToken,scopes:['username']})
    });
  })
  .then(function(r){log('[AUTH] Backend status='+r.status);return r.json()})
  .then(function(data){
    log('[AUTH] Backend response: '+JSON.stringify(data).substring(0,200));
    if(data.access_token){
      log('[AUTH] SUCCESS! Redirecting...');
      localStorage.setItem('equal_token',data.access_token);
      window.location.href='/onboarding';
    }else{
      log('[AUTH] No token in response',new Error(JSON.stringify(data)));
      document.getElementById('btnText').textContent='Login with Pi';
      document.getElementById('loginBtn').disabled=false;
    }
  })
  .catch(function(err){
    log('[AUTH] FAILED',err);
    document.getElementById('btnText').textContent='Login with Pi';
    document.getElementById('loginBtn').disabled=false;
  });
}
</script>
</body>
</html>
