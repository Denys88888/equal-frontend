<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Equal — The first dating app on Pi Network. Your affection has no price. Free forever.">
    <meta name="theme-color" content="#BB83C9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#232323" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Equal" />
    <title>Equal - Dating on Pi Network</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="image" href="/hero-couple.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
      // Pi Browser = NO sandbox key at all. Other browsers = sandbox:true
      var isPiBrowser = /PiBrowser/.test(navigator.userAgent) || /Pi Browser/.test(navigator.userAgent);
      console.log('[PI INIT] UA=' + navigator.userAgent.substring(0, 50));
      console.log('[PI INIT] isPiBrowser=' + isPiBrowser);
      if (typeof Pi !== 'undefined') {
        try {
          var initConfig = { version: "2.0" };
          if (!isPiBrowser) {
            initConfig.sandbox = true;
          }
          console.log('[PI INIT] config=' + JSON.stringify(initConfig));
          Pi.init(initConfig);
          console.log('[PI INIT] ✅ Pi.init done');
        } catch (e) {
          console.error('[PI INIT] ❌ Pi.init failed:', e.message || e);
        }
      } else {
        console.error('[PI INIT] ❌ Pi SDK not loaded');
      }
    </script>
  </body>
</html>
